allowBuilds:
  # @swc/core installs its platform-specific native binary, which @swc/jest
  # requires to transform TypeScript tests.
  "@swc/core": true
  # unrs-resolver is a transitive dependency of jest-resolve (jest 30) that
  # fetches its native binary via a postinstall script.
  unrs-resolver: true
  # esbuild fetches its platform-specific binary via postinstall.
  esbuild: true
overrides:
  diff: ">=8.0.3"
