# CD: clasp push + deploy

.deploy_base:
  stage: deploy
  image: node:24@sha256:5711a0d445a1af54af9589066c646df387d1831a608226f4cd694fc59e745059
  before_script:
    - corepack enable
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
  script:
    - pnpm run build
    - echo "$CLASPRC_JSON" > ~/.clasprc.json
    - echo "$CLASP_JSON" > .clasp.json
    - pnpm exec clasp push -f
    - pnpm exec clasp deploy -i "$DEPLOYMENT_ID" --description "GitLab CD from $CI_COMMIT_REF_NAME@$CI_COMMIT_SHORT_SHA"
  cache:
    key: pnpm-$CI_COMMIT_REF_SLUG
    paths:
      - .pnpm-store
  needs: [check]

deploy_dev:
  extends: .deploy_base
  environment:
    name: development
  rules:
    - if: $CI_COMMIT_BRANCH == "dev" && $CI_PIPELINE_SOURCE == "push" && $CI_PROJECT_PATH != $TEMPLATE_PROJECT_PATH

deploy_prod:
  extends: .deploy_base
  environment:
    name: production
  resource_group: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push" && $CI_PROJECT_PATH != $TEMPLATE_PROJECT_PATH
